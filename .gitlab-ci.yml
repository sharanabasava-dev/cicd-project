stages:
  - build
  - test
  - push
  - deploy

variables:
  IMAGE_NAME: sharana123/cicd-app
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour

test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install flask pytest
    - pytest tests/ -v

push:
  stage: push
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  dependencies:
    - build
  script:
    - docker load < image.tar
    - echo "Dockerhub@123" | docker login -u sharana123 --password-stdin
    - docker push sharana123/cicd-app:$CI_COMMIT_SHORT_SHA
    - docker tag sharana123/cicd-app:$CI_COMMIT_SHORT_SHA sharana123/cicd-app:latest
    - docker push sharana123/cicd-app:latest
  only:
    - main
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
  - apk add --no-cache openssh-client
  - mkdir -p ~/.ssh
  - echo "$EC2_KEY" | base64 -d > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - echo "HOST = [$EC2_HOST]"
  - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $EC2_USER@$EC2_HOST "
        docker pull $IMAGE_NAME:latest &&
        docker stop cicd-app || true &&
        docker rm cicd-app || true &&
        docker run -d \
          --name cicd-app \
          --restart always \
          -p 5000:5000 \
          $IMAGE_NAME:latest
        echo 'Deployment successful!'
      "
  only:
    - main